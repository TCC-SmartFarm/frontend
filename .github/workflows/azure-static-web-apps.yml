name: CI/CD Pipeline - SmartFarm Web

on:
  push:
    branches:
      - prod
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy (${{ github.ref_name }})

    environment:
      name: ${{ github.ref_name == 'prod' && 'production' || 'development' }}

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v3

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Instalar Dependências
        run: npm ci

      - name: Quality Gate (Type Check & Lint)
        run: |
          npm run tsc
          npm run lint

      - name: Build e Deploy para o Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.VITE_AUTH0_CLIENT_ID }}

          # Variáveis futuras
          # VITE_AUTH0_AUDIENCE: ${{ vars.VITE_AUTH0_AUDIENCE }}
          # VITE_MAP_TILE_URL: ${{ vars.VITE_MAP_TILE_URL }}
          # VITE_MAP_TILE_API_KEY: ${{ secrets.VITE_MAP_TILE_API_KEY }}
